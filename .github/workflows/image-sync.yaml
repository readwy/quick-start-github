name: images synchronization on push

on:
  push:
    branches: [ main ]
    paths: [ images.txt ]

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Record disk space before disk release
      run: |
        echo "disk space before disk release"
        echo "----------------------------------------------------------------------------"
        df -hT
        echo "----------------------------------------------------------------------------"

    - name: Maximize build space
      uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Record disk space after disk release complete
      run: |
        echo "disk space after disk release"
        echo "----------------------------------------------------------------------------"
        df -hT
        echo "----------------------------------------------------------------------------"

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Filter changed images
      id: filter
      run: |
        set -euo pipefail

        before_sha="${{ github.event.before }}"
        after_sha="${{ github.sha }}"
        output_file="$RUNNER_TEMP/changed-images.txt"

        bash ./.github/scripts/image-sync/filter-changed-images.sh "$before_sha" "$after_sha" "images.txt" "$output_file"

        if [[ ! -s "$output_file" ]]; then
          echo "has_images=false" >> "$GITHUB_OUTPUT"
          echo "No images to sync for this push."
          exit 0
        fi

        echo "has_images=true" >> "$GITHUB_OUTPUT"
        echo "image_list_file=$output_file" >> "$GITHUB_OUTPUT"
        echo "Changed images:"
        cat "$output_file"

    - name: Sync image to custom registry
      if: steps.filter.outputs.has_images == 'true'
      env:
        REGISTRY_URL: "${{ secrets.REGISTRY_URL }}"
        REGISTRY_NAMESPACE: "${{ secrets.REGISTRY_NAMESPACE }}"
        REGISTRY_USER: "${{ secrets.REGISTRY_USER }}"
        REGISTRY_PASSWORD: "${{ secrets.REGISTRY_PASSWORD }}"
        IMAGE_LIST_FILE: "${{ steps.filter.outputs.image_list_file }}"
      run: bash ./.github/scripts/image-sync/sync-images.sh
